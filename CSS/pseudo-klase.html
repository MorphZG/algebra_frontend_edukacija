<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>pseudo-klase</title>

        <style>
            body {
                color: #333;
                font-family: Roboto, Ubuntu;
                font-size: 22px;
            }

            a {
                color: yellow;
                text-decoration: none;
            }

            a:visited {
                color: red;
            }

            a:hover {
                color: #f93;
            }

            a:focus {
              color: #f0f;
            }

            a:active {
              color: aqua;
            }
        </style>
    </head>
    <body>
        <ul>
            <li><a href="#pero">lorem</a></li>
            <li><a href="#jura">lorem</a></li>
            <li><a href="#homepage">lorem</a></li>
            <li><a href="#stranica">lorem</a></li>
            <li><a href="#stranica2">lorem</a></li>
            <li><a href="#stranica34">lorem</a></li>
        </ul>
    </body>
</html>
