<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flex-item Recreation</title>
    <style>
        /* --- General Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 1. Set full-page background image */
            /* MAKE SURE TO HAVE AN IMAGE NAMED 'mountains.jpg' IN THE SAME FOLDER */
            background-image: url('mountains.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 2. Center the container on the screen */
            height: 100vh;
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center;    /* Center vertically */
            
            font-family: Arial, sans-serif;
        }

        .container {
            /* 3. Define the flexbox layout for the items */
            display: flex;
            gap: 2rem; /* The spacing between the boxes */
        }

        .flex-item {
            /* 4. Basic Box Styling */
            width: 150px;       /* Set a fixed square size */
            height: 150px;
            border: 3px solid #fff; /* The thick white border */
            
            /* 5. Center text inside the box */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 6. Text styling */
            color: white;
            font-size: 5rem;
            font-weight: bold;
            
            /* 7. Allow content inside to inherit background and filter */
            position: relative;
            overflow: hidden;
        }

        /* 8. The trick: A pseudo-element for background-filter */
        .flex-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: inherit; /* This pulls in the body's background image */
            background-size: cover;
            background-position: center;
            z-index: -1; /* Place it behind the text */
        }

        /* --- Individual Box Styling: Overlays and Filters --- */

        /* Left box: 'C' (Dark-grey/magenta overlay) */
        .flex-item:nth-child(1)::before {
            background-color: rgba(60, 45, 60, 0.7); /* The base color */
            background-blend-mode: color-dodge;    /* Blend color with image */
            filter: grayscale(100%);               /* Apply greyscale to the final result */
        }

        /* Middle box: 'S' (Magenta-pink overlay) */
        .flex-item:nth-child(2)::before {
            background-color: rgba(135, 12, 53, 0.6); /* Transparent purple-pink */
            background-blend-mode: multiply;
        }

        /* Right box: 'S' (Orange-sepia overlay)
