<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graficki elementi</title>
  </head>
  <body>
    <svg width="900" height="500" viewBox="0 0 500 200">
      <!--plavi prsten-->
      <circle
        cx="100"
        cy="50"
        r="40"
        stroke="blue"
        stroke-width="5"
        fill="none"
      />
      <!--zuti prsten-->
      <circle
        cx="150"
        cy="100"
        r="40"
        stroke="orange"
        stroke-width="5"
        fill="none"
      />
      <!--crni prsten-->
      <circle
        cx="200"
        cy="50"
        r="40"
        stroke="black"
        stroke-width="5"
        fill="none"
      />
      <!--zeleni prsten-->
      <circle
        cx="250"
        cy="100"
        r="40"
        stroke="green"
        stroke-width="5"
        fill="none"
      />
      <!--crveni prsten-->
      <circle
        cx="300"
        cy="50"
        r="40"
        stroke="red"
        stroke-width="5"
        fill="none"
      />
    </svg>
  </body>
</html>
