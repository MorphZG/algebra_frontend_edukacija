<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graficki elementi</title>
  </head>
  <body>
    <!--random fotka 300x300-->
    <img src="https://picsum.photos/300/300" alt="url/width/height" />
    <!--lokalna fotka-->
    <img
      src="./assets/hackerimage12.png"
      title="haker"
      alt="lokalna fotka"
      width="200"
    />
    <br />
    <!--svg rectangle-->
    <svg width="300" height="130">
      <rect
        width="200"
        height="100"
        x="10"
        y="10"
        rx="20"
        ry="20"
        fill="blue"
        stroke="black"
        stroke-width="2"
      />
    </svg>
    <svg>
      <rect
        width="200"
        height="100"
        fill="red"
        stroke="black"
        stroke-width="3"
        xmlns="http://www.w3.org/2000/svg"
      />
    </svg>
    <br />
    <!--svg circle-->
    <svg height="100" width="100" xmlns="http://www.w3.org/2000/svg">
      <circle
        r="45"
        cx="50"
        cy="50"
        fill="red"
        stroke="black"
        stroke-width="3"
      />
    </svg>
    <svg height="100" width="100" xmlns="http://www.w3.org/2000/svg">
      <circle r="45" cx="50" cy="50" fill="red" />
    </svg>
  </body>
</html>
